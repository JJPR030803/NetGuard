# pytest.ini - Explicit pytest configuration for NetGuard
# This file provides explicit configuration that complements pyproject.toml

[pytest]
# Minimum pytest version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Command line options (applied to every pytest run)
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage (enabled by default, can override with --no-cov)
    --cov=src/netguard
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # Warnings
    -W default
    # Fail on first error (remove if you want to see all failures)
    # --maxfail=1

# Markers (also defined in conftest.py for documentation)
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (medium speed)
    e2e: End-to-end tests (slow, full system)
    slow: Slow tests (use -m "not slow" to skip)
    performance: Performance/benchmark tests

# Console output style
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (requires pytest-timeout)
# timeout = 300
# timeout_method = thread

# Parallel execution (requires pytest-xdist)
# Uncomment to enable parallel testing
# addopts = -n auto

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*
    */__pycache__/*

[coverage:report]
# Fail if coverage drops below threshold
# fail_under = 80

exclude_lines =
    # Standard pragma
    pragma: no cover
    # Don't complain about missing debug code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if 0:
    if __name__ == .__main__.:
    # Don't complain about abstract methods
    @(abc\.)?abstractmethod
    # Don't complain about type checking blocks
    if TYPE_CHECKING: