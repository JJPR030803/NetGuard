site_name: NetGuard
site_description: Network security analysis tool — hybrid Rust/Python architecture
repo_url: https://github.com/juanjulian/netguard
repo_name: netguard

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - First Run: getting-started/first-run.md
    - Quick Start: getting-started/quick-start.md
  - User Guide:
    - user-guide/index.md
    - Capture: user-guide/capture.md
    - Workflows: user-guide/workflows.md
    - Configuration: user-guide/configuration.md
    - Troubleshooting: user-guide/troubleshooting.md
  - Architecture:
    - architecture/index.md
    - Orchestrator: architecture/orchestrator.md
    - IPC Protocol: architecture/ipc.md
    - Data Plane: architecture/data-plane.md
    - Python Core: architecture/python-core.md
    - Decisions (ADRs):
      - architecture/decisions/index.md
      - ADR 001 - Hybrid Architecture: architecture/decisions/001-stub.md
      - ADR 002 - IPC Unix Sockets: architecture/decisions/002-stub.md
      - ADR 003 - TUI MVU Pattern: architecture/decisions/003-stub.md
      - ADR 004 - Orchestrator State Authority: architecture/decisions/004-stub.md
      - ADR 005 - Explicit State Machine: architecture/decisions/005-stub.md
      - ADR 006 - Degraded Mode: architecture/decisions/006-stub.md
      - ADR 007 - Supervisor Restart Policy: architecture/decisions/007-stub.md
      - ADR 008 - Handshake & Capability Discovery: architecture/decisions/008-stub.md
      - ADR 009 - PyO3 vs Sidecar: architecture/decisions/009-stub.md
      - ADR 010 - Command Async MVU: architecture/decisions/010-stub.md
      - ADR 011 - IPC Envelope Format: architecture/decisions/011-stub.md
      - ADR 012 - Data Plane Checkpointing: architecture/decisions/012-stub.md
      - ADR 013 - Config Architecture: architecture/decisions/013-stub.md
      - ADR 014 - Sidecar Testing Strategy: architecture/decisions/014-stub.md
      - ADR 015 - Logging Architecture: architecture/decisions/015-stub.md
      - ADR 016 - Graceful Shutdown: architecture/decisions/016-stub.md
      - ADR 017 - First-Run Wizard: architecture/decisions/017-stub.md
      - ADR 018 - Centralized Configuration: architecture/decisions/018-stub.md
  - API Reference:
    - api/index.md
    - CLI Reference: api/cli-reference.md
    - Python API:
      - Capture: api/python/capture.md
      - Analysis: api/python/analysis.md
      - Workflows: api/python/workflows.md
      - Core: api/python/core.md
    - Rust API: api/rust/index.md
  - Development:
    - development/index.md
    - Setup: development/setup.md
    - Testing: development/testing.md
    - Security: development/security.md
    - Contributing: development/contributing.md
